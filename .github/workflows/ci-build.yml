name: CI Build

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            backend/package-lock.json
            customer-app/package-lock.json
            admin-dashboard/admin-dashboard/package-lock.json
            delivery-dashboard/package-lock.json
            supplier-dashboard/package-lock.json
            vendor-dashboard/vendor-dashboard/package-lock.json

      - name: Install & build backend
        run: |
          npm ci --omit=optional --prefix ./backend
          npm --prefix ./backend run build || true

      - name: Install & build customer
        run: |
          npm ci --prefix ./customer-app
          npm --prefix ./customer-app run build

      - name: Install & build admin
        run: |
          npm ci --prefix ./admin-dashboard/admin-dashboard
          npm --prefix ./admin-dashboard/admin-dashboard run build

      - name: Install & build delivery
        run: |
          npm ci --prefix ./delivery-dashboard
          npm --prefix ./delivery-dashboard run build

      - name: Install & build supplier
        run: |
          npm ci --prefix ./supplier-dashboard
          npm --prefix ./supplier-dashboard run build

      - name: Install & build vendor
        run: |
          npm ci --prefix ./vendor-dashboard/vendor-dashboard
          npm --prefix ./vendor-dashboard/vendor-dashboard run build

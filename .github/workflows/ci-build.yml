name: CI Build

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      npm_config_fund: false
      npm_config_audit: false
      npm_config_optional: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Show npm config (debug)
        run: npm config list

      # ── Backend (no native binaries needed) ──────────────────────────────
      - name: Install backend
        run: npm ci --omit=optional --prefix ./backend

      # ── Customer app ─────────────────────────────────────────────────────
      - name: Install customer
        working-directory: ./customer-app
        run: rm -f package-lock.json && npm install

      - name: Build customer
        working-directory: ./customer-app
        run: npm run build

      # ── Admin dashboard ──────────────────────────────────────────────────
      - name: Install admin
        working-directory: ./admin-dashboard/admin-dashboard
        run: rm -f package-lock.json && npm install

      - name: Build admin
        working-directory: ./admin-dashboard/admin-dashboard
        run: npm run build

      # ── Delivery dashboard ───────────────────────────────────────────────
      - name: Install delivery
        working-directory: ./delivery-dashboard
        run: rm -f package-lock.json && npm install

      - name: Build delivery
        working-directory: ./delivery-dashboard
        run: npm run build

      # ── Supplier dashboard ───────────────────────────────────────────────
      - name: Install supplier
        working-directory: ./supplier-dashboard
        run: rm -f package-lock.json && npm install

      - name: Build supplier
        working-directory: ./supplier-dashboard
        run: npm run build

      # ── Vendor dashboard ─────────────────────────────────────────────────
      - name: Install vendor
        working-directory: ./vendor-dashboard/vendor-dashboard
        run: rm -f package-lock.json && npm install

      - name: Build vendor
        working-directory: ./vendor-dashboard/vendor-dashboard
        run: npm run build

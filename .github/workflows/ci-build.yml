name: CI Build

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Suppress npm funding/audit noise in CI logs
      npm_config_fund: false
      npm_config_audit: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      # ── Backend (no native binaries needed) ──────────────────────────────
      - name: Install backend
        run: npm ci --omit=optional --prefix ./backend

      # ── Customer app ─────────────────────────────────────────────────────
      - name: Install customer
        run: npm install --prefix ./customer-app

      - name: Build customer
        run: npm --prefix ./customer-app run build

      # ── Admin dashboard ──────────────────────────────────────────────────
      - name: Install admin
        run: npm install --prefix ./admin-dashboard/admin-dashboard

      - name: Build admin
        run: npm --prefix ./admin-dashboard/admin-dashboard run build

      # ── Delivery dashboard ───────────────────────────────────────────────
      - name: Install delivery
        run: npm install --prefix ./delivery-dashboard

      - name: Build delivery
        run: npm --prefix ./delivery-dashboard run build

      # ── Supplier dashboard ───────────────────────────────────────────────
      - name: Install supplier
        run: npm install --prefix ./supplier-dashboard

      - name: Build supplier
        run: npm --prefix ./supplier-dashboard run build

      # ── Vendor dashboard ─────────────────────────────────────────────────
      - name: Install vendor
        run: npm install --prefix ./vendor-dashboard/vendor-dashboard

      - name: Build vendor
        run: npm --prefix ./vendor-dashboard/vendor-dashboard run build

name: CI Build

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      npm_config_fund: false
      npm_config_audit: false
      npm_config_optional: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      # ── Backend (no native binaries needed) ──────────────────────────────
      - name: Install backend
        run: npm ci --omit=optional --prefix ./backend

      # ── Customer app ─────────────────────────────────────────────────────
      - name: Install & build customer
        working-directory: ./customer-app
        run: |
          rm -rf node_modules package-lock.json
          npm install
          npm run build

      # ── Admin dashboard ──────────────────────────────────────────────────
      - name: Install & build admin
        working-directory: ./admin-dashboard/admin-dashboard
        run: |
          rm -rf node_modules package-lock.json
          npm install
          npm run build

      # ── Delivery dashboard ───────────────────────────────────────────────
      - name: Install & build delivery
        working-directory: ./delivery-dashboard
        run: |
          rm -rf node_modules package-lock.json
          npm install
          npm run build

      # ── Supplier dashboard ───────────────────────────────────────────────
      - name: Install & build supplier
        working-directory: ./supplier-dashboard
        run: |
          rm -rf node_modules package-lock.json
          npm install
          npm run build

      # ── Vendor dashboard ─────────────────────────────────────────────────
      - name: Install & build vendor
        working-directory: ./vendor-dashboard/vendor-dashboard
        run: |
          rm -rf node_modules package-lock.json
          npm install
          npm run build

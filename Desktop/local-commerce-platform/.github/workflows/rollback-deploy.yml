name: Rollback Deploy

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Rollback target label"
        required: true
        default: "production"
        type: choice
        options:
          - staging
          - production
      reason:
        description: "Rollback reason"
        required: false
        default: "Post-deploy issue mitigation"
      couponDaysBack:
        description: "Coupon analytics validation window"
        required: true
        default: "30"
        type: choice
        options:
          - "7"
          - "30"
          - "90"

jobs:
  rollback-backend:
    name: Rollback Backend
    runs-on: ubuntu-latest
    steps:
      - name: Validate required rollback secrets
        run: |
          test -n "${{ secrets.BACKEND_ROLLBACK_HOOK_URL }}" || (echo "Missing BACKEND_ROLLBACK_HOOK_URL" && exit 1)
          test -n "${{ secrets.API_BASE_URL }}" || (echo "Missing API_BASE_URL" && exit 1)

      - name: Trigger backend rollback
        run: |
          echo "Rollback reason: ${{ github.event.inputs.reason }}"
          curl -fsS -X POST "${{ secrets.BACKEND_ROLLBACK_HOOK_URL }}"

      - name: Wait for backend health
        env:
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
        run: |
          for i in $(seq 1 30); do
            if curl -fsS "$API_BASE_URL/health" > /dev/null; then
              echo "Backend is healthy after rollback"
              exit 0
            fi
            echo "Waiting for backend rollback health... attempt $i"
            sleep 10
          done
          echo "Backend did not recover after rollback in time"
          exit 1

  rollback-frontends:
    name: Rollback Frontends
    runs-on: ubuntu-latest
    needs: rollback-backend
    steps:
      - name: Trigger customer rollback
        if: ${{ secrets.CUSTOMER_ROLLBACK_HOOK_URL != '' }}
        run: curl -fsS -X POST "${{ secrets.CUSTOMER_ROLLBACK_HOOK_URL }}"

      - name: Trigger admin rollback
        if: ${{ secrets.ADMIN_ROLLBACK_HOOK_URL != '' }}
        run: curl -fsS -X POST "${{ secrets.ADMIN_ROLLBACK_HOOK_URL }}"

      - name: Trigger delivery rollback
        if: ${{ secrets.DELIVERY_ROLLBACK_HOOK_URL != '' }}
        run: curl -fsS -X POST "${{ secrets.DELIVERY_ROLLBACK_HOOK_URL }}"

      - name: Trigger supplier rollback
        if: ${{ secrets.SUPPLIER_ROLLBACK_HOOK_URL != '' }}
        run: curl -fsS -X POST "${{ secrets.SUPPLIER_ROLLBACK_HOOK_URL }}"

      - name: Trigger vendor rollback
        if: ${{ secrets.VENDOR_ROLLBACK_HOOK_URL != '' }}
        run: curl -fsS -X POST "${{ secrets.VENDOR_ROLLBACK_HOOK_URL }}"

  post-rollback-verify:
    name: Post Rollback Verify
    runs-on: ubuntu-latest
    needs: rollback-frontends
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install backend dependencies
        run: npm --prefix ./local-commerce-platform/backend ci

      - name: Run API smoke against rollback target
        env:
          SMOKE_BASE_URL: ${{ secrets.API_BASE_URL }}
          SMOKE_CUSTOMER_EMAIL: ${{ secrets.SMOKE_CUSTOMER_EMAIL }}
          SMOKE_CUSTOMER_PASSWORD: ${{ secrets.SMOKE_CUSTOMER_PASSWORD }}
          SMOKE_DRIVER_EMAIL: ${{ secrets.SMOKE_DRIVER_EMAIL }}
          SMOKE_DRIVER_PASSWORD: ${{ secrets.SMOKE_DRIVER_PASSWORD }}
          SMOKE_ADMIN_EMAIL: ${{ secrets.SMOKE_ADMIN_EMAIL }}
          SMOKE_ADMIN_PASSWORD: ${{ secrets.SMOKE_ADMIN_PASSWORD }}
        run: npm --prefix ./local-commerce-platform/backend run smoke:api

      - name: Verify frontend URLs after rollback
        env:
          CUSTOMER_BASE_URL: ${{ secrets.CUSTOMER_BASE_URL }}
          ADMIN_BASE_URL: ${{ secrets.ADMIN_BASE_URL }}
          DELIVERY_BASE_URL: ${{ secrets.DELIVERY_BASE_URL }}
          SUPPLIER_BASE_URL: ${{ secrets.SUPPLIER_BASE_URL }}
          VENDOR_BASE_URL: ${{ secrets.VENDOR_BASE_URL }}
        run: |
          check_url() {
            local name="$1"
            local url="$2"

            if [ -z "$url" ]; then
              echo "Skipping $name URL check (secret not set)"
              return 0
            fi

            for i in $(seq 1 24); do
              code=$(curl -s -o /dev/null -w "%{http_code}" "$url" || true)
              if [ "$code" -ge 200 ] && [ "$code" -lt 500 ]; then
                echo "$name is reachable after rollback ($code): $url"
                return 0
              fi
              echo "Waiting for $name rollback availability... attempt $i (last code: $code)"
              sleep 10
            done

            echo "$name did not become reachable after rollback: $url"
            return 1
          }

          check_url "Customer" "$CUSTOMER_BASE_URL"
          check_url "Admin" "$ADMIN_BASE_URL"
          check_url "Delivery" "$DELIVERY_BASE_URL"
          check_url "Supplier" "$SUPPLIER_BASE_URL"
          check_url "Vendor" "$VENDOR_BASE_URL"

      - name: Verify coupon analytics and export endpoints
        env:
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          ADMIN_EMAIL: ${{ secrets.SMOKE_ADMIN_EMAIL }}
          ADMIN_PASSWORD: ${{ secrets.SMOKE_ADMIN_PASSWORD }}
          COUPON_DAYS_BACK: ${{ github.event.inputs.couponDaysBack }}
        run: |
          ADMIN_TOKEN=$(curl -fsS -X POST "$API_BASE_URL/api/auth/login" \
            -H "Content-Type: application/json" \
            -d "{\"email\":\"$ADMIN_EMAIL\",\"password\":\"$ADMIN_PASSWORD\"}" | \
            node -e "const fs=require('fs');const d=JSON.parse(fs.readFileSync(0,'utf8'));process.stdout.write(d.token||'')")
          test -n "$ADMIN_TOKEN" || (echo "Failed to login admin for rollback verification" && exit 1)

          curl -fsS "$API_BASE_URL/api/analytics/dashboard?daysBack=$COUPON_DAYS_BACK" \
            -H "Authorization: Bearer $ADMIN_TOKEN" > /dev/null

          curl -fsS "$API_BASE_URL/api/analytics/coupons/export?daysBack=$COUPON_DAYS_BACK" \
            -H "Authorization: Bearer $ADMIN_TOKEN" > /dev/null

          echo "Rollback coupon analytics checks passed"
